<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16233b" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- NOTE: brand name is a placeholder — see src/config/brand.js.
         prerender.mjs rewrites title/description/canonical/og per route. -->
    <title>Canopy Tent Co. — Custom Printed Canopy Tents with Instant Pricing</title>
    <meta name="description" content="Custom printed pop-up canopy tents in 8x8, 10x10, 10x15 and 10x20. Choose your frame grade, print coverage, walls and accessories and see the price update live. Free artwork proof, shipped across the US and Canada." />
    <meta name="keywords" content="custom canopy tent, printed pop up canopy, 10x10 custom tent, 10x20 canopy tent, branded event tent, vendor market tent, trade show tent, replacement canopy top, canopy sidewalls" />
    <link rel="canonical" href="https://printing-business-platform-frontend.vercel.app/" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Canopy Tent Co." />
    <meta property="og:title" content="Canopy Tent Co. — Custom Printed Canopy Tents" />
    <meta property="og:description" content="Configure size, frame, print coverage and walls and see the price update live. Free artwork proof on every order." />
    <meta property="og:url" content="https://printing-business-platform-frontend.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Canopy Tent Co. — Custom Printed Canopy Tents" />
    <meta name="twitter:description" content="Custom printed pop-up canopy tents with instant online pricing and a free artwork proof." />

    <!-- Site-wide structured data (LocalBusiness) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Canopy Tent Co.",
      "description": "Custom printed pop-up canopy tents, sidewalls, replacement tops and accessories with instant online pricing and a free artwork proof.",
      "url": "https://printing-business-platform-frontend.vercel.app/",
      "email": "sales@example.com",
      "telephone": "+1-800-555-0148",
      "priceRange": "$$",
      "areaServed": [
        { "@type": "Country", "name": "United States" },
        { "@type": "Country", "name": "Canada" }
      ],
      "makesOffer": [
        { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Custom Printed Canopy Tent" } },
        { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Canopy Tent Packages" } },
        { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Replacement Canopy Tops" } }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
